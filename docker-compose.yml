services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: findcnpj-api:latest
    container_name: findcnpj-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      BRASILAPI_BASE_URL: https://brasilapi.com.br/api
      CORS_ORIGIN: http://localhost:8080
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 60
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - findcnpj

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Browser do usuário acessa a API pelo host, não pela rede interna do compose
        VITE_API_BASE_URL: http://localhost:3000
    image: findcnpj-web:latest
    container_name: findcnpj-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - findcnpj

networks:
  findcnpj:
    driver: bridge
